name: Build PMAP Executables

on:
  push:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4
      
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        
    - name: Compilar con PyInstaller
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          pyinstaller --name "PMAP_Sovereign" --onefile --noconsole --add-data "index.html;." --add-data "favicon.svg;." pmap_core/pmap/server.py
        else
          pyinstaller --name "PMAP_Sovereign" --onefile --add-data "index.html:." --add-data "favicon.svg:." pmap_core/pmap/server.py
        fi
        
    - name: Guardar los Ejecutables (.zip)
      uses: actions/upload-artifact@v4
      with:
        name: PMAP_Sovereign_${{ matrix.os }}
        path: dist/*
