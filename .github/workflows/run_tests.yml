name: PMAP Forensic Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Código
      uses: actions/checkout@v4
      
    - name: Instalar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest duckdb networkx
        
    - name: Ejecutar Autopsia (Tests)
      run: |
        pytest tests/ -v
