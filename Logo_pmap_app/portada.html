<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Portada Gumroad - PMAP.APP</title>
    <style>
        /* Bloqueamos la medida exacta requerida por Gumroad */
        .portada-contenedor { width: 1280px; height: 720px; }
    </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen m-0">

    <div class="portada-contenedor bg-[#0f172a] relative overflow-hidden flex items-center shadow-2xl">
        
        <div class="w-5/12 pl-16 pr-8 flex flex-col justify-center items-center">
            <img src="Logo_pmap_app.svg" alt="PMAP.APP Logo" class="w-full drop-shadow-lg">
        </div>

        <div class="w-7/12 h-full py-16 pr-16 relative">
            <div class="bg-slate-800 w-full h-full rounded-2xl shadow-[0_25px_60px_-15px_rgba(0,0,0,0.8)] border border-slate-700/60 p-8 flex flex-col gap-6 transform translate-x-8 hover:-translate-y-2 transition-transform duration-500">
                
                <div class="flex justify-between items-center border-b border-slate-700 pb-4">
                    <div class="text-slate-300 font-semibold text-lg tracking-wide">PMAP Analytics</div>
                    <div class="flex gap-2">
                        <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    
                    <div class="bg-slate-900/80 rounded-xl p-6 border border-slate-700/50 flex flex-col justify-center shadow-inner relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-[#f59e0b]"></div>
                        <span class="text-slate-400 text-xs tracking-widest uppercase mb-2 font-semibold">Índice de Amnesia</span>
                        <div class="flex items-end gap-3">
                            <span class="text-5xl font-bold text-white">94<span class="text-[#f59e0b]">.2</span></span>
                            <span class="text-emerald-400 text-sm font-medium mb-1">↑ +3.4%</span>
                        </div>
                        <span class="text-slate-500 text-xs mt-3">Estado de retención forense actual</span>
                    </div>

                    <div class="bg-slate-900/80 rounded-xl p-6 border border-slate-700/50 flex items-end gap-3 justify-center shadow-inner">
                        <div class="w-full bg-slate-800 rounded-t-sm h-2/5"></div>
                        <div class="w-full bg-slate-800 rounded-t-sm h-3/5"></div>
                        <div class="w-full bg-[#f59e0b] rounded-t-sm h-full shadow-[0_0_15px_rgba(245,158,11,0.4)]"></div>
                        <div class="w-full bg-slate-800 rounded-t-sm h-4/5"></div>
                        <div class="w-full bg-slate-800 rounded-t-sm h-1/2"></div>
                    </div>
                </div>

                <div class="bg-slate-900/80 rounded-xl border border-slate-700/50 flex-1 p-6 flex flex-col shadow-inner">
                    <span class="text-slate-400 text-xs tracking-widest uppercase mb-4 font-semibold">Trazabilidad en tiempo real</span>
                    <div class="flex-1 relative border-b border-l border-slate-700/50 pb-2 pl-2">
                        <svg class="w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">
                            <path d="M0,80 Q20,50 40,65 T70,30 T100,20 L100,100 L0,100 Z" fill="rgba(245, 158, 11, 0.05)" />
                            <path d="M0,80 Q20,50 40,65 T70,30 T100,20" fill="none" stroke="#f59e0b" stroke-width="2.5" class="drop-shadow-md"/>
                        </svg>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
